name: CI
on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Run bulletproof checks
        run: npm run bulletproof:check

      - name: Build
        run: |
          echo '{}' > config.json
          npm run dist

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag
        id: tagInfo
        run: |
          VERSION=$(echo $GITHUB_REF_NAME | sed -e 's/^v//')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "ENVIRONMENT=$(echo $VERSION | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' && echo 'production' || echo 'staging')" >> $GITHUB_OUTPUT
          echo "SENTRY_RELEASE=extension@$VERSION" >> $GITHUB_OUTPUT

      - name: Create config.json
        run: echo '{}' > config.json

      - name: Build
        run: npm run dist
        env:
          NODE_ENV: production
          NODE_ENV_VER: ${{ steps.tagInfo.outputs.VERSION }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: ${{ steps.tagInfo.outputs.ENVIRONMENT }}
          SENTRY_RELEASE: ${{ steps.tagInfo.outputs.SENTRY_RELEASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: true
          files: dist/*.zip

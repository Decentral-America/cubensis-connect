version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      production:
        patterns:
          - '*'
        exclude-patterns:
          - '@types/*'
          - 'eslint*'
          - 'prettier'
          - 'typescript*'
          - 'vitest*'
          - 'webpack*'
          - 'husky'
          - 'lint-staged'
      dev-tooling:
        patterns:
          - '@types/*'
          - 'eslint*'
          - 'prettier'
          - 'typescript*'
          - 'vitest*'
          - 'webpack*'
          - 'husky'
          - 'lint-staged'
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
